<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>計分器</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Noto+Sans+TC:wght@400;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --accent: #00E5FF;
    --hot: #FF6B00;
    --danger: #FF1A1A;
    --bg: #0a0a0a;
    --surface: #111;
    --border: #1e1e1e;
    --muted: #444;
    --label: #666;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: #f0f0f0;
    font-family: 'Noto Sans TC', sans-serif;
    overflow: hidden;
    touch-action: manipulation;
  }

  #app {
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* ── TOP STATS ── */
  #top {
    padding: 44px 28px 12px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    flex-shrink: 0;
  }

  .stat { display: flex; flex-direction: column; align-items: center; gap: 2px; }

  .stat-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--label);
  }

  .stat-num {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 80px;
    font-weight: 900;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    transition: color 0.3s;
  }

  #timer-num { color: #f0f0f0; }
  #timer-num.warn { color: var(--hot); }
  #timer-num.danger { color: var(--danger); }
  #score-num { color: var(--accent); }

  /* ── PROGRESS BAR ── */
  #bar-wrap {
    margin: 4px 28px 10px;
    height: 4px;
    background: #1a1a1a;
    border-radius: 2px;
    overflow: hidden;
    flex-shrink: 0;
  }
  #bar {
    height: 100%;
    width: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.95s linear, background 0.3s;
  }

  /* ── HISTORY ── */
  #history {
    padding: 6px 28px 10px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    flex-shrink: 0;
    min-height: 38px;
  }
  .h-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-right: 2px;
  }
  .h-chip {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 700;
    background: #181818;
    border: 0.5px solid #2a2a2a;
    color: #888;
    padding: 2px 10px;
    border-radius: 20px;
  }
  .h-chip.best { border-color: #FFD700; color: #FFD700; }
  #hist-empty { font-size: 12px; color: var(--muted); }

  /* ── TAP ZONE ── */
  #tap-zone {
    flex: 1;
    position: relative;
    background: var(--surface);
    border-top: 0.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    overflow: hidden;
  }

  /* ripple */
  .ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,107,0,0.18);
    transform: scale(0);
    animation: ripple-anim 0.5s ease-out forwards;
    pointer-events: none;
  }
  @keyframes ripple-anim {
    to { transform: scale(4); opacity: 0; }
  }

  #tap-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    pointer-events: none;
    transition: transform 0.08s;
  }
  #tap-zone:active #tap-inner { transform: scale(0.92); }

  #tap-circle {
    width: 170px;
    height: 170px;
    border-radius: 50%;
    background: conic-gradient(from 180deg, #FF6B00, #FF1A1A, #FF6B00);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
  }
  #tap-circle .big {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 42px;
    font-weight: 900;
    color: #fff;
    letter-spacing: 0.05em;
  }
  #tap-circle .sm {
    font-size: 13px;
    color: rgba(255,255,255,0.65);
  }

  #hint {
    font-size: 12px;
    color: var(--muted);
    transition: opacity 0.4s;
  }

  /* floating reset */
  #float-reset {
    position: absolute;
    top: 14px;
    right: 14px;
    padding: 7px 16px;
    background: #1e1e1e;
    color: #aaa;
    border: 0.5px solid #333;
    border-radius: 50px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    display: none;
    z-index: 5;
  }
  #float-reset.show { display: block; }
  #float-reset:active { transform: scale(0.95); }

  /* ── END OVERLAY ── */
  #end-overlay {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.93);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    z-index: 20;
  }
  #end-overlay.show { display: flex; }

  #end-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #666;
  }
  #end-score {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 100px;
    font-weight: 900;
    color: var(--accent);
    line-height: 1;
  }
  #end-best { font-size: 14px; color: #FFD700; min-height: 20px; }

  #end-reset {
    margin-top: 16px;
    padding: 14px 44px;
    background: var(--hot);
    color: #fff;
    border: none;
    border-radius: 50px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.06em;
    cursor: pointer;
  }
  #end-reset:active { transform: scale(0.96); }
</style>
</head>
<body>
<div id="app">

  <div id="top">
    <div class="stat">
      <div class="stat-label">倒數</div>
      <div class="stat-num" id="timer-num">60</div>
    </div>
    <div class="stat">
      <div class="stat-label">得分</div>
      <div class="stat-num" id="score-num">0</div>
    </div>
  </div>

  <div id="bar-wrap"><div id="bar"></div></div>

  <div id="history">
    <span class="h-label">紀錄</span>
    <span id="hist-empty">尚無紀錄</span>
  </div>

  <div id="tap-zone" onclick="handleTap(event)">
    <button id="float-reset" onclick="event.stopPropagation(); resetGame()">再來一次</button>
    <div id="tap-inner">
      <div id="tap-circle">
        <span class="big">TAP</span>
        <span class="sm">點我得分</span>
      </div>
      <div id="hint">第一下開始計時</div>
    </div>
    <div id="end-overlay">
      <div id="end-title">時間到！最終得分</div>
      <div id="end-score">0</div>
      <div id="end-best"></div>
      <button id="end-reset" onclick="event.stopPropagation(); resetGame()">再來一次</button>
    </div>
  </div>

</div>

<script>
const TOTAL = 60;
let remaining = TOTAL, score = 0, started = false, ticker = null;
let history = [];
let audioCtx = null;

function ctx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playTick() {
  try {
    const c = ctx(), now = c.currentTime;
    const osc = c.createOscillator();
    const gain = c.createGain();
    const bpf = c.createBiquadFilter();
    bpf.type = 'bandpass'; bpf.frequency.value = 1800; bpf.Q.value = 2.5;
    osc.type = 'sine';
    osc.frequency.setValueAtTime(1600, now);
    osc.frequency.exponentialRampToValueAtTime(900, now + 0.06);
    gain.gain.setValueAtTime(0.55, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
    osc.connect(bpf); bpf.connect(gain); gain.connect(c.destination);
    osc.start(now); osc.stop(now + 0.09);
  } catch(e) {}
}

function playEnd() {
  try {
    const c = ctx(), now = c.currentTime;
    [0, 0.13, 0.28].forEach((t, i) => {
      const osc = c.createOscillator(), gain = c.createGain();
      osc.type = 'sine';
      osc.frequency.value = [523, 415, 330][i];
      gain.gain.setValueAtTime(0.4, now + t);
      gain.gain.exponentialRampToValueAtTime(0.001, now + t + 0.2);
      osc.connect(gain); gain.connect(c.destination);
      osc.start(now + t); osc.stop(now + t + 0.22);
    });
  } catch(e) {}
}

const timerEl  = document.getElementById('timer-num');
const scoreEl  = document.getElementById('score-num');
const barEl    = document.getElementById('bar');
const hintEl   = document.getElementById('hint');
const floatEl  = document.getElementById('float-reset');
const overlay  = document.getElementById('end-overlay');
const endScEl  = document.getElementById('end-score');
const endBstEl = document.getElementById('end-best');
const histPanel= document.getElementById('history');
const histEmpty= document.getElementById('hist-empty');

function updateBar() {
  barEl.style.width = (remaining / TOTAL * 100) + '%';
  barEl.style.background = remaining <= 10 ? '#FF1A1A' : remaining <= 20 ? '#FF6B00' : '#00E5FF';
}

function updateTimerColor() {
  timerEl.classList.remove('warn','danger');
  if (remaining <= 10) timerEl.classList.add('danger');
  else if (remaining <= 20) timerEl.classList.add('warn');
}

function spawnRipple(e) {
  const zone = document.getElementById('tap-zone');
  const r = document.createElement('div');
  r.className = 'ripple';
  const rect = zone.getBoundingClientRect();
  const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
  const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
  const size = Math.max(rect.width, rect.height) * 1.2;
  r.style.cssText = `width:${size}px;height:${size}px;left:${x - size/2}px;top:${y - size/2}px`;
  zone.appendChild(r);
  r.addEventListener('animationend', () => r.remove());
}

function handleTap(e) {
  if (remaining <= 0) return;
  playTick();
  spawnRipple(e);
  if (!started) {
    started = true;
    hintEl.style.opacity = '0';
    floatEl.classList.add('show');
    ticker = setInterval(() => {
      remaining--;
      timerEl.textContent = remaining;
      updateTimerColor();
      updateBar();
      if (remaining <= 0) { clearInterval(ticker); endGame(); }
    }, 1000);
  }
  score++;
  scoreEl.textContent = score;
}

function endGame() {
  playEnd();
  history.unshift(score);
  if (history.length > 6) history = history.slice(0, 6);
  renderHistory();
  endScEl.textContent = score;
  const best = Math.max(...history);
  endBstEl.textContent = score === best && history.length > 1 ? '🏆 新紀錄！' : '最高：' + best;
  overlay.classList.add('show');
  floatEl.classList.remove('show');
}

function renderHistory() {
  histEmpty.style.display = 'none';
  histPanel.querySelectorAll('.h-chip').forEach(c => c.remove());
  const best = Math.max(...history);
  history.forEach((s, i) => {
    const el = document.createElement('span');
    el.className = 'h-chip' + (s === best ? ' best' : '');
    el.textContent = (i === 0 ? '★ ' : '') + s;
    histPanel.appendChild(el);
  });
}

function resetGame() {
  clearInterval(ticker);
  remaining = TOTAL; score = 0; started = false;
  timerEl.textContent = TOTAL;
  timerEl.classList.remove('warn','danger');
  scoreEl.textContent = 0;
  barEl.style.width = '100%';
  barEl.style.background = '#00E5FF';
  hintEl.style.opacity = '1';
  floatEl.classList.remove('show');
  overlay.classList.remove('show');
}
</script>
</body>
</html>
